# gitops-app/.github/workflows/ci-ops-app1.yml
name: CI ops-app1 (ECR)

on:
  push:
    branches: [main]
    paths:
      - "ops-app1/**"
      - ".github/workflows/ci-ops-app1.yaml"

env:
  APP_NAME: ops-app1
  ECR_REPOSITORY: ops-app1
  AWS_REGION: ap-northeast-2
  GITHUB_ORG: wonhou
  CONFIG_REPO: ${{ github.repository_owner }}/gitops-config
  CONFIG_REPO_PATH: apps/ops-app1/overlays

permissions:
  id-token: write # OIDC 토큰 발급 필수
  contents: read

jobs:
  ci:
    name: Build and Push to ECR
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./ops-app1
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      image-uri: ${{ steps.tag.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Maven 테스트
        run: mvn test -q

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 태그·URI 생성
        id: tag
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${URI}" >> $GITHUB_OUTPUT

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: ECR Push
        uses: docker/build-push-action@v5
        with:
          context: ./ops-app1
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tag.outputs.uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-config:
    name: Update Config Repo
    needs: ci
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Config Repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Kustomize 설치
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: dev overlay 이미지 업데이트 (ECR URI)
        env:
          IMAGE_URI: ${{ needs.ci.outputs.image-uri }}
        run: |
          cd config-repo/${{ env.CONFIG_REPO_PATH }}/dev
          kustomize edit set image ${{ env.APP_NAME }}=$IMAGE_URI

      - name: Config Repo 커밋·Push
        env:
          IMAGE_URI: ${{ needs.ci.outputs.image-uri }}
        run: |
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit \
            -m "chore: update ${{ env.APP_NAME }} eks-dev image to $IMAGE_URI [skip ci]"
          git push
