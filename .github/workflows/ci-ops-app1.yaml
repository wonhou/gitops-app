name: CI ops-app1

on:
  push:
    branches: [main]
    paths:
      - "ops-app1/**"
      - ".github/workflows/ci-ops-app1.yaml"
  pull_request:
    branches: [main]
    paths:
      - "ops-app1/**"

env:
  APP_NAME: ops-app1
  DOCKERHUB_IMAGE: dnjsgh/ops-app1
  CONFIG_REPO: wonhou123/gitops-config
  CONFIG_REPO_PATH: apps/ops-app1/overlays

permissions:
  contents: read

jobs:
  ci:
    name: Build and Push
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./ops-app1 # 모노리포의 ops-app1 디렉토리
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Maven 테스트
        run: mvn test -q

      - name: 이미지 태그 생성 (Git SHA 7자리)
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 설정 (캐시 최적화)
        uses: docker/setup-buildx-action@v3

      - name: Docker 빌드 및 Push
        uses: docker/build-push-action@v5
        with:
          context: ./ops-app1 # 모노리포 경로 명시
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-config:
    name: Update Config Repo
    needs: ci
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Config Repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Kustomize 설치
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: dev overlay 이미지 태그 업데이트
        env:
          IMAGE_TAG: ${{ needs.ci.outputs.image-tag }}
        run: |
          cd config-repo/${{ env.CONFIG_REPO_PATH }}/dev
          kustomize edit set image \
            ${{ env.APP_NAME }}=${{ env.DOCKERHUB_IMAGE }}:$IMAGE_TAG

      - name: Config Repo 커밋 및 Push
        env:
          IMAGE_TAG: ${{ needs.ci.outputs.image-tag }}
        run: |
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit \
            -m "chore: update ${{ env.APP_NAME }} dev image to $IMAGE_TAG [skip ci]"
          git push
