name: CI ops-app1 (ECR)

on:
  push:
    branches: [main]
    paths:
      - "ops-app1/**"
      - ".github/workflows/ci-ops-app1.yaml"

env:
  APP_NAME: ops-app1
  ECR_REPOSITORY: ops-app1
  AWS_REGION: ap-northeast-2
  CONFIG_REPO: ${{ github.repository_owner }}/gitops-config
  CONFIG_REPO_PATH: apps/ops-app1/overlays

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: Build and Push to ECR
    runs-on: ubuntu-24.04
    outputs:
      image-repo-tag: ${{ steps.export.outputs.image-repo-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Maven 테스트
        working-directory: ./ops-app1
        run: mvn test -q

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 빌드 및 ECR Push
        working-directory: ./ops-app1
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          docker build -t ${URI} .
          docker push ${URI}

          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Export image outputs
        id: export
        run: |
          echo "image-repo-tag=${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "확인 image-repo-tag=${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

  update-config:
    name: Update Config Repo
    needs: ci
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 값 확인
        run: |
          echo "image-repo-tag=${{ needs.ci.outputs.image-repo-tag }}"

      - name: Config Repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Kustomize 설치
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: dev overlay 이미지 업데이트
        run: |
          # update-config job 에서 registry 직접 조합
          FULL_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ needs.ci.outputs.image-repo-tag }}"
          echo "Updated: ${{ env.APP_NAME }}=${FULL_URI}"
          cd config-repo/${{ env.CONFIG_REPO_PATH }}/dev
          kustomize edit set image ${{ env.APP_NAME }}=${FULL_URI}

      - name: Config Repo 커밋·Push
        run: |
          FULL_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ needs.ci.outputs.image-repo-tag }}"
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit \
            -m "chore: update ${{ env.APP_NAME }} dev image to ${FULL_URI} [skip ci]"
          git push
